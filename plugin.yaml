name: harness-guard
version: "1.1.0"
description: "Post-execution result-correctness guard: audit all tool calls, verify write operation results via a configurable review model (default GLM-5.2) before the result reaches the model. Focuses on whether the output is correct, not on whether the action should be taken."
author: "user"
hooks:
  - post_tool_call
  - transform_tool_result
